# PROTOTYPES describe typical individuals, characterized by specific
# values of their variables
prototypes:
  population:
    - default_population:
        treatment: NT
        early_slaughter_state: NES
        treatment_triggered: 0
        not_yet_treated: 1
        thinning_time: 34
        slaughter_time: 42
        cum_I: 0
        cum_B: 0
        cum_thinning: 0
        cum_mort: 0
        previous_cum_mort: 0
        daily_mort: 0
        previous_flock_size: 0
  individuals:
    - healthy:
        desc: 'healthy individuals'
        health_state: S
        bacterial_state: NB
        respiratory_state: H
        growth_state: NG
        mort_state: A
        thinning_state: P
    - late_infected:
        desc: 'individuals that become infected at introduction_time'
        health_state: pI
        bacterial_state: NB
        respiratory_state: H
        growth_state: NG
        mort_state: A
        thinning_state: P



