# NAME OF THE DISEASE
model_name: IBV_spread

model_info:
  abstract: 'This model is aimed at simulation an IBV outbreak in a broiler house. The pathogenicity of IBV is based on generally found strains in the NL. The model includes severe secondary infections, antibiotic treatments, vaccination scenarios and the possibility of early slaughter'

#  _______ _
# |__   __(_)
#    | |   _ _ __ ___   ___
#    | |  | | '_ ` _ \ / _ \
#    | |  | | | | | | |  __/
#    |_|  |_|_| |_| |_|\___|


# TIME INFORMATION
time_info:
  time_unit: days
  delta_t: 1
  total_duration: 42
  stop_condition: 'Eq(time, slaughter_time)'
# note: day starts at 0


#  _                    _
# | |                  | |
# | |     _____   _____| |___
# | |    / _ \ \ / / _ \ / __|
# | |___|  __/\ V /  __/ \__ \
# |______\___| \_/ \___|_|___/


# LEVELS OF AGENTS
levels:
  individuals:
    desc: 'level of individuals'
  population:
    desc: 'level of the population'
    contains:
      - individuals
    aggregation_type: 'compartment'
    default_prototype: default_population



#  _____
# |  __ \
# | |__) | __ ___   ___ ___  ___ ___  ___  ___
# |  ___/ '__/ _ \ / __/ _ \/ __/ __|/ _ \/ __|
# | |   | | | (_) | (_|  __/\__ \__ \  __/\__ \
# |_|   |_|  \___/ \___\___||___/___/\___||___/



# LIST OF PROCESSES TO BE EXECUTED AFTER EACH OTHER DURING EACH TIME STEP
processes:
  population:
    - treatment
    - early_slaughter_state
  individuals:
    - health_state
    - bacterial_state
    - respiratory_state
    - growth_state
    - mort_state
    - thinning_state

grouping:
  population:
    respi: [bacterial_state, respiratory_state] # to count birds with respiratory signs
    
#   _____ _        _         __  __            _     _
#  / ____| |      | |       |  \/  |          | |   (_)
# | (___ | |_ __ _| |_ ___  | \  / | __ _  ___| |__  _ _ __   ___  ___
#  \___ \| __/ _` | __/ _ \ | |\/| |/ _` |/ __| '_ \| | '_ \ / _ \/ __|
#  ____) | || (_| | ||  __/ | |  | | (_| | (__| | | | | | | |  __/\__ \
# |_____/ \__\__,_|\__\___| |_|  |_|\__,_|\___|_| |_|_|_| |_|\___||___/

# DESCRIPTION OF THE STATE MACHINES INVOLVED IN THE MODEL
# Each state machine is composed at least of several states.
# The name of a state machine defines an individual variable which
# contains the value of the current state in the individual.
# Transitions define how each change can change to another one.
# Productions define how individuals in one state can produce
# new individuals in another state.

state_machines:
  #-------------
  # Treatment (population scale)
  #-------------
  treatment:
    desc: 'A state machine to trigger treatment at population scale'
    states:
      - NT:
          name: 'NoTreatment'
          desc: 'No treatment in the current population'
          fillcolor: 'green'
          on_stay:
            - set_var: daily_mort
              value: 'DIV(cum_mort - previous_cum_mort, previous_flock_size)'
            - set_var: previous_cum_mort
              value: 'cum_mort'
            - set_var: previous_flock_size
              value: 'flock_size'     # total_population or total_P gives recursion error
      - TT:
          on_enter:
            - set_var: treatment_triggered
              value: 1
            - message: 'Mortality above threshold'
          on_stay:
            - set_var: daily_mort
              value: 'DIV(cum_mort - previous_cum_mort, previous_flock_size)'
            - set_var: previous_cum_mort
              value: 'cum_mort'
            - set_var: previous_flock_size
              value: 'flock_size'           # total_population or total_P gives recursion error
          name: 'Triggered'
          desc: 'Treatment triggered by mortality above threshold. Treatment with antibiotics follows if slaughter day allows'
          fillcolor: 'red'
    transitions:
      - {from: NT, to: TT, proba: 'float(daily_mort > treatment_trigger)'}

  #-------------
  # Early slaughter (population scale)
  #-------------
  early_slaughter_state:
    desc: 'State machine that keeps track of early slaughter and slaughter day'
    states:
      - NES:
          name: 'NoEarlySlaughter'
          desc: 'No early slaughter triggered'
      - ET:
          name: 'EarlyThinning'
          desc: 'Early thinning triggered if early slaughter is allowed, treatment is triggered, but treatment is not allowed'
          on_enter:
          - set_var: thinning_time
            value: time + 1 
      - ES:
          name: 'EarlySlaughter'
          desc: 'Early slaughter triggered if early slaughter is allowed, treatment is triggered, but treatment is not allowed'
          on_enter:
          - set_var: slaughter_time
            value: time + 1
    transitions:
      - {from: NES, to: ET, proba: 'float(AND(Eq(early_slaughter, 1), is_TT, not_yet_treated, StrictGreaterThan(time, thinning_time - 5), StrictLessThan(time, thinning_time)))'}
      - {from: NES, to: ES, proba: 'float(AND(Eq(early_slaughter, 1), is_TT, not_yet_treated, StrictGreaterThan(time, slaughter_time - 5), StrictLessThan(time, slaughter_time)))'}
    
    # ! This means that having early thinning AND early slaughter is not possible. In this case this is good, because treatment_triggered is not reset.
    # And the expected behaviour is that after early thinning, antibiotics are given and early slaughter is not necessary.
    # ! This also uses the assumption that when antibiotics is given once, early slaughter is not necessary anymore. This holds when infection doesn't happen very early in production round.

  #-------------
  # Health state
  #-------------

  health_state:
    desc: 'The state machine which defines the evolution of health states'
    states:
      - pI:
          name: 'preInfectious'
          desc: 'animals that will introduce the infection in the batch at introduction_time'
          fillcolor: 'pink'
      - S:
          name: 'Susceptible'
          desc: 'suceptible of becoming infected'
          fillcolor: 'wheat'
      - I0:
          name: 'Infected_subclinical'
          desc: 'infected and able to transmit the disease; no symptoms'
          fillcolor: 'maroon'
      - I:
          name: 'Infected_clinical'
          desc: 'infected and able to transmit the disease; symptoms (mild or severe)'
          fillcolor: 'darkkhaki'
          on_enter:
          - record_change: cum_I
      - R:
          name: 'Resistant'
          desc: 'healthy again and resistant to infection'
          fillcolor: 'deepskyblue'
     
    transitions:
    # infection
      - {from: pI, to: I, proba: 'float(Eq(time, introduction_time))'}
      - {from: S, to: I0, rate: 'force_of_infection * (1 - prop_clinical)'}
      - {from: S, to: I, rate: 'force_of_infection * prop_clinical'}

      # recovery
      - {from: I0, to: R, rate: recovery}
      - {from: I, to: R, rate: recovery}

  #-------------
  # Bacterial state
  #-------------
  bacterial_state:
    desc: 'The state machine which defines the evolution of secondary bacterial infection'
    states:
      - NB:
          name: 'No_bacterial'
          desc: 'no bacterial infection'
          fillcolor: 'wheat'
      - PB:
          name: 'Pre_bacterial'
          desc: 'predisposed for bacterial infection after x days'
          duration: t_until_bact_inf
          fillcolor: 'deepskyblue'
      - B:
          name: 'Bacterial'
          desc: 'bacterial infection'
          duration: length_B
          fillcolor: 'purple'
          on_enter:
          - record_change: cum_B
      - RB:
          name: 'Recovered_bacterial'
          desc: 'Recovered or did not get a bacterial infection in the first place'
          fillcolor: 'seagreen'
      - RL:
          name: 'Recovered_lesions'
          desc: 'Recovered from acute infection but not from organ lesions'
          fillcolor: 'gold'

    transitions:
      # from no bact infection to 'waiting time'
      - {from: NB, to: PB, proba: 'is_I0 * prop_bact_inf_I0'}
      - {from: NB, to: PB, proba: 'is_I * prop_bact_inf_I'}

      # birds that don't get a secondary infection
      - {from: NB, to: RB, proba: 'is_I0 * (1 - prop_bact_inf_I0)'}
      - {from: NB, to: RB, proba: 'is_I * (1 - prop_bact_inf_I)'}

      # after waiting time
      - {from: PB, to: B, proba: '1'}

      # recovery
      - {from: B, to: RB, proba: '1'}

      # treatment (not if 5 days or less before thinning or slaughter)
      - from: B
        to: RL
        escape: yes
        proba: 'treatment_triggered * not_yet_treated * treatment_allowed * antibiotic_effectiveness'
        on_cross:
          - set_var: not_yet_treated
            value: 0  # so one time effect of treatment
          - message: 'B Treated'
      - from: PB
        to: RB
        escape: yes
        proba: 'treatment_triggered * not_yet_treated  * treatment_allowed * antibiotic_effectiveness'


  #-------------
  # Respiratory state
  #-------------

  respiratory_state:
    desc: 'The state machine which defines clinical signs of IB (not bacterial infection!)'
    states:
      - H:
          name: 'Healthy'
          desc: 'No clinical respiratory signs. Can also be subclinical'
          fillcolor: 'Gold'
      - Hi:
          name: 'Healthy_infected'
          desc: 'Infected but no respiratory signs yet'
          duration: 'time_before_respiratory_signs'
      - RS:
          name: 'Respiratory_signs'
          desc: 'Respiratory signs: discharge from eyes and nostrils, sounds (sneezing, coughing, rales...)'
          fillcolor: 'FireBrick'
          duration: 'duration_respiratory_signs'
      - RRS:
          name: 'Recovered_resp_signs'
          desc: 'Recovered from respiratory signs of IB'
          fillcolor: 'Maroon'

    transitions:
    # infection / development of clinical signs
    - {from: H, to: Hi, proba: 'is_I'}
    - {from: Hi, to: RS, proba: '1'}

    # recovery
    - {from: RS, to: RRS, proba: '1'}


 #-------------
  # Growth state
  #-------------

  growth_state:
    desc: 'The state machine which defines reduced growth (as a sign of IB and bacterial infections)'
    states:
      - NG:
          name: 'Normal growth'
          desc: 'Healthy or subclinical IB infection'
          fillcolor: 'GreenYellow'
      - NGi:
          name: 'Normal_growth_infected'
          desc: 'Infected with IB and clinical, but no reduced growth yet'
          duration: 'time_before_reduced_growth'
          fillcolor: 'LightSeaGreen'
      - RGi:
          name: 'Reduced_growth_infected'
          desc: 'Reduced growth in the group with clinical signs of IB'
          fillcolor: 'SeaGreen'
          duration: 'duration_reduced_growth' # except in case of secondary infection
      - RGb:
          name: 'Reduced_growth_bact'
          desc: 'Reduced growth in chickens with bacterial infection'
          fillcolor: 'DarkViolet'
      - NGr:
          name: 'Normal_growth_recovered'
          desc: 'Recovered from reduced growth, cant get reduced growth again'
          fillcolor: 'purple'

    transitions:
    # infection
    - {from: NG, to: NGi, proba: 'is_I'}

    # development of reduced growth
    - {from: NGi, to: RGi, proba: '1'}

    # secondary bacterial infection
    - {from: RGi, to: RGb, escape: yes, proba: 'is_B'}   # despite a duration for RGi, you can still escape to RGb if in B state

    # recovery
    - {from: RGi, to: NGr, proba: 1 }
    - {from: RGb, to: NGr, proba: 'is_RB'} # normal growth when recovered from the bacterial infection
    - {from: RGb, to: NGr, proba: 'is_RL'} # normal growth when treated for the bacterial infection (but there are still lesions)

    # Notes: chickens can only go to reduced_growth_bacterial group from the reduced_growth IB groups because the durations of IB infection, time until clinical signs and 
    # time until secondary bact. infection make it impossible to go from normal growth to RGbs.

  #-------------
  # Mort state
  #-------------

  mort_state:
    desc: 'The state machine which keeps track of mortality'
    states:
      - A:
          name: 'Alive'
          desc: 'alive'
          fillcolor: 'wheat'
      - De:
          name: 'Dead'
          desc: 'dead'
          on_enter:
            - record_change: cum_mort   # variable to count number of dead chickens
          autoremove: yes

    transitions:
      # from no bact infection to 'waiting time'
      - {from: A, to: De, rate: 'is_B * mortality_B + (1 - is_B) * is_I * mortality_I + (1 - is_B) * (1 - is_I) * normal_mortality'}
    

  #-------------
  # Thinning state
  #-------------

  thinning_state:
    desc: 'The state machine which defines thinning of the flock based on thinning date'
    states:
      - P:
          name: 'Present'
          desc: 'Not thinned'
          fillcolor: 'darkgreen'
      - T:
          name: 'Thinned'
          desc: 'Birds removed at thinning'
          autoremove: yes

    transitions:
      - from: P
        to: T
        amount: >
          ROUND(
          float(Eq(time, thinning_time)) * 
          thinning_number * DIV(total_my_health_state_my_bacterial_state_my_respiratory_state_my_growth_state_my_mort_state_P, total_population)
          )
        # modulates thinning_number by the proportion of animals in each health_state
        # if you add another state machine then you have to change 'total_my_health_state_..._P'
        on_cross:
          - record_change: cum_thinning   # count number of thinned birds (diseased)


#  _____                               _
# |  __ \                             | |
# | |__) |_ _ _ __ __ _ _ __ ___   ___| |_ ___ _ __ ___
# |  ___/ _` | '__/ _` | '_ ` _ \ / _ \ __/ _ \ '__/ __|
# | |  | (_| | | | (_| | | | | | |  __/ ||  __/ |  \__ \
# |_|   \__,_|_|  \__,_|_| |_| |_|\___|\__\___|_|  |___/

parameters:

  # initial values
  initial_population_size:
    desc: 'initial number of animals in the population'
    value: 30000
  initial_infected:
    desc: 'initial number of infected animals in the population'
    value: 5
  
  vaccination_scenario:
    desc: 'change parameters based on vaccination scenario. Possible values: 0, 0.5, 1, where 1 is the optimal scenario'
    value: '0'

  # counts
  total_infectious:
    desc: 'all infectious groups'
    value: 'total_I0 + total_I'

  # IBV
  introduction_time:
    desc: 'day when virus is introduced in the flock'
    value: '14'
  beta_factor:
    desc: 'for sensitivity analysis, to change beta' #because you can't overwrite a computer parameter
    value: 1
  beta:
    desc: 'transmission rate from infectious individuals (/day)'
    source: 'Brimer et al. (2024)'
    value: 'beta_factor * (float(Eq(vaccination_scenario, 1)) * 0.17 + float(Eq(vaccination_scenario, 0)) * 0.78 + float(Eq(vaccination_scenario, 0.5)) * 0.48)'
  recovery_factor:
    desc: 'for sensitivity analysis, to change recovery rate' #because you can't overwrite a computer parameter
    value: 1
  recovery:
    desc: 'recovery rate (gamma)'
    source: 'Brimer et al. (2024)'
    value: 'recovery_factor * (float(Eq(vaccination_scenario, 0)) * 1/12 + float(Eq(vaccination_scenario, 0.5)) * 1/12 + float(Eq(vaccination_scenario, 1)) * 1/3.5)'
  force_of_infection:
    desc: 'force of infection'
    value: 'DIV(beta * total_infectious, total_P)'
  prop_clinical_base:
    desc: 'for sensitivity analysis, to change prop_clinical without vaccination scenario interference'
    value: 0.9
  prop_clinical:
    desc: 'proportion of IB infected birds that show clinical signs (instead of subclinical)'
    source: 'expert opinion'
    value: 'prop_clinical_base - (float(Eq(vaccination_scenario, 0.5)) * 0.1)' #vaccination 0.5 -> 80% clinical signs

  # mortality
  normal_mortality:
    desc: 'mortality rate (/day)'
    value: 0.000725
  mortality_I:
    desc: 'mortality rate (/day) in case of clinical IB infection'
    source: 'expert: based on 70% mild infections with 1x mort and 20% severe infections with 3x higher mort'
    value: '1.3 * normal_mortality'
  mortality_B:
    desc: 'mortality rate (/day) in case of severe bacterial infection'
    source: 'Yunis et al. (2002) & Matthijs et al. (2005)'
    value: '0.40 / 14'  # =0.029 = 2.9%;  0.40 / 14 = 40x normal mortality

  # clinical signs
  time_before_respiratory_signs:
    desc: 'days between infection with IB and respiratory signs'
    value: '1'
  duration_respiratory_signs:
    desc: 'length of clinical (respiratory) disease caused by IB'
    value: '7'
  time_before_reduced_growth:
    desc: 'days between infection with IB and reduced growth'
    value: '2'
  duration_reduced_growth:
    desc: 'length of reduced growth caused by IB'
    value: '8'

  # thinning and slaughter
  thinning_number:
    desc: 'number of birds that is removed before slaughter'
    value: 7500
  early_slaughter:
    desc: 'indicator if early thinning or slaughter in case of disease is allowed'
    value: 0
  
  # secondary infections
  t_until_bact_inf:
    desc: 'days from IB infection until bacterial infection'
    source: 'expert: 4-7 days'
    value: 5
  length_B:
    desc: 'length of secondary infection'
    value: 14

  prop_bact_factor:
    desc: 'factor to multiply prop_bact_inf with, for sensitivity analysis (to change both parameters at once)'
    value: '1'
  prop_bact_inf_I0:
    desc: 'proportion of secondary bacterial infection in I0 group'
    source: 'expert opinion'
    value: 'prop_bact_factor * 0.02'
  prop_bact_inf_I: 
    desc: 'proportion of secondary bacterial infection in I group'
    source: 'expert opinion, based on estimate of 6% in mild cases (78% of clinical cases) and 45% in severe cases (22% of clinical cases)'
    value: 'prop_bact_factor * 0.15'

  # antibiotic treatment
  treatment_trigger:
    desc: 'daily mortality (in %) above which antibiotic treatment is started'
    source: 'expert opinion'
    value: '0.002'
  flock_size:
    desc: 'number of birds present (alternative to total_population)'
    value: initial_population_size - cum_mort - cum_thinning
    
  treatment_allowed:
    desc: 'indicator if day is >5 days before thinning or slaughter'
    value: >
      float(NOT(OR(
      AND(StrictGreaterThan(time, thinning_time-5), LessThan(time, thinning_time)),
      StrictGreaterThan(time, slaughter_time-5)
      )))
  antibiotic_effectiveness:
    desc: 'fraction of birds cured of secondary infection after treatment'
    value: '0.9'
 
  # outputs
  percentage_prevalence:
    desc: '% of animals infected'
    value: '100 * total_infectious / total_P'
  percentage_prevalence_secondary:
    desc: '% of animals with secondary infection'
    value: '100 * total_B / total_P'
  percentage_prevalence_recovered_lesions:
    desc: '% of animals recovered but with lesions'
    value: '100 * total_RL / total_P'

  daily_mortality:
    desc: 'daily mortality as fraction of flock size at start of step'
    value: daily_mort
  percentage_daily_mortality:
    value: '100 * daily_mortality'
  percentage_mortality:
    desc: 'TOTAL mortality as % of initial population, both in health_state and in bacterial_state'
    value: '100 * cum_mort / initial_population_size'

  total_resp_signs:
    desc: 'total number of chickens with respiratory signs, either due to IB or to bacterial infection'
    value: 'total_RS + total_B - total_B_RS'
  percentage_total_resp_signs:
    desc: '% of chickens with respiratory signs, either due to IB or to bacterial infection'
    value: 'total_resp_signs / total_P * 100'

# state variables
statevars:
  cum_mort:
    desc: 'cumulative mortality'
  previous_cum_mort:
    desc: 'cumulative mortality caused by viral infection at the previous time step'
  daily_mort:
    desc: 'daily mortality (in birds) caused by viral infection'



